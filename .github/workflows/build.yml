name: Build and test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore WPF-TaskManager.sln

      - name: Build
        run: dotnet build WPF-TaskManager.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test WPF-TaskManager.sln --no-build --configuration Release
